<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A Life Remembered</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.png" type="image/png">

</head>
<body class="home-page">
  <main class="home-shell">
    <section class="home-hero" aria-label="Memorial photo">
      <div class="hero-photo-frame">
        <img id="heroPhoto" class="hero-photo" alt="Selected memorial photograph">
      </div>
      <div class="home-copy">
        <p class="eyebrow">Celebrating a life beautifully lived</p>
        <p class="memorial-name">__SITE_NAME__</p>
        <h1>A Life Remembered</h1>
      </div>
      <button id="playButton" class="play-button" type="button" aria-label="Play memorial slideshow">
        <span class="play-icon" aria-hidden="true"></span>
        <span>Play</span>
      </button>
    </section>
  </main>

  <a class="admin-link" href="admin.html" aria-label="Open admin">Admin</a>
  <script src="app.js"></script>

</html>
